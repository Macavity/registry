name: Stage

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - plugins.txt
      - themes.txt
      - icons.txt
      - templates.txt
      - widgets.txt
  schedule:
    - cron: '*/15 * * * *'

concurrency:
  group: stage
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  stage:
    if: ${{ github.repository_owner == 'Macavity' }}
    runs-on: ubuntu-latest
    env:
      STAGE_POOL_SIZE: 80
    steps:
      - name: Mint Gardener App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GARDENER_APP_ID }}
          private-key: ${{ secrets.GARDENER_APP_PRIVATE_KEY }}

      - name: Resolve bot user id
        id: bot
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)
          echo "id=$id" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run actions/stage/main.ts
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}

      - name: Commit and push
        env:
          BOT_NAME: ${{ steps.app-token.outputs.app-slug }}[bot]
          BOT_EMAIL: ${{ steps.bot.outputs.id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com
        run: |-
          git config --global user.email "$BOT_EMAIL"
          git config --global user.name "$BOT_NAME"
          git add .
          if git diff --cached --quiet; then
            echo "no changes"
            exit 0
          fi
          git diff --cached --stat
          git commit -m ":bookmark: Update index"
          git pull --rebase
          git push
